name: quality

on:
  pull_request:
  push:
    branches: [main]

jobs:
  javascript:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Check JavaScript syntax
        run: |
          node --check app.js
          node --check auth.js
          node --check catalog.js
          node --check chat-data.js
          node --check support-data.js
          node --check transactions.js
          node --check api/_utils.js
          node --check api/health.js
          node --check api/confirm-payment.js
      - name: Ensure DB SQL is not duplicated here
        run: test ! -d supabase
